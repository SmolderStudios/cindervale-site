<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>240SX LS3 Build</title>
<style>
:root{
  --bg:#0d0f14; --card:#151922; --card2:#1b2130; --edge:#2a3245;
  --txt:#e8e6df; --dim:#9aa3b5; --ember:#ff7a3c; --ember2:#ffb35c;
  --ok:#4cc97a; --warn:#e8c14b; --need:#e05d5d;
  --w-red:#e04040; --w-yel:#e8c821; --w-orn:#f08a2c; --w-brn:#9a6b3f;
  --w-wht:#e8e8e8; --w-blu:#3f8de0; --w-ltb:#7ec8f0; --w-grn:#3fbf6a;
  --w-vio:#a86ee8; --w-gry:#9aa0aa; --w-blk:#666; --w-pnk:#ef7fb2; --w-tan:#cdb28a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#12151d 0%,#12151dee 100%);backdrop-filter:blur(8px);border-bottom:1px solid var(--edge);padding:12px 16px 10px}
header h1{font-size:1.05rem;letter-spacing:.5px}
header h1 b{color:var(--ember)}
.pbarWrap{margin-top:8px;background:#0a0c10;border:1px solid var(--edge);border-radius:99px;height:14px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,var(--ember),var(--ember2));border-radius:99px;width:0%;transition:width .35s}
.psub{display:flex;justify-content:space-between;font-size:.72rem;color:var(--dim);margin-top:4px}
main{padding:14px 12px 20px;max-width:860px;margin:0 auto}
.tab{display:none}
.tab.on{display:block}
.card{background:var(--card);border:1px solid var(--edge);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card>.chead{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;user-select:none}
.card>.chead h2{font-size:.95rem;flex:1;line-height:1.3}
.card>.chead .mini{font-size:.72rem;color:var(--dim);font-weight:400;display:block;margin-top:2px}
.badge{font-size:.7rem;padding:3px 9px;border-radius:99px;border:1px solid var(--edge);color:var(--dim);white-space:nowrap}
.badge.done{color:var(--ok);border-color:var(--ok)}
.chev{color:var(--dim);transition:transform .2s;font-size:.8rem}
.card.open .chev{transform:rotate(90deg)}
.cbody{display:none;padding:0 14px 14px;border-top:1px solid var(--edge)}
.card.open .cbody{display:block}
.step{display:flex;gap:12px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid #ffffff0d}
.step:last-child{border-bottom:none}
.step .ck{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--edge);background:#0a0c10;display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;cursor:pointer;margin-top:1px}
.step.done .ck{background:var(--ok);border-color:var(--ok);color:#0a0c10}
.step .st{flex:1;font-size:.88rem;line-height:1.45}
.step.done .st{color:var(--dim);text-decoration:line-through;text-decoration-color:#ffffff44}
.step .st small{display:block;color:var(--dim);font-size:.76rem;margin-top:3px;line-height:1.4;text-decoration:none}
.note{background:#1a1f2c;border-left:3px solid var(--ember);border-radius:0 8px 8px 0;padding:10px 12px;font-size:.8rem;color:#cfd4de;margin:10px 0;line-height:1.5}
.note.warn{border-left-color:var(--warn)}
.note b{color:var(--ember2)}
/* parts */
.pitem{display:flex;gap:10px;align-items:center;padding:11px 4px;border-bottom:1px solid #ffffff0d}
.pitem:last-child{border-bottom:none}
.pitem .pn{flex:1;font-size:.85rem;line-height:1.35}
.pitem .pn small{display:block;color:var(--dim);font-size:.74rem;margin-top:2px}
.pstat{flex:none;font-size:.7rem;font-weight:600;padding:5px 10px;border-radius:99px;cursor:pointer;border:1px solid;min-width:64px;text-align:center;user-select:none}
.pstat.s0{color:var(--need);border-color:var(--need);background:#e05d5d14}
.pstat.s1{color:var(--warn);border-color:var(--warn);background:#e8c14b14}
.pstat.s2{color:var(--ok);border-color:var(--ok);background:#4cc97a14}
/* wiring */
.dwrap{overflow-x:auto;background:#0a0c10;border:1px solid var(--edge);border-radius:10px;margin:10px 0;-webkit-overflow-scrolling:touch}
.dwrap svg{display:block;min-width:660px;width:100%;height:auto}
table.wt{width:100%;border-collapse:collapse;font-size:.78rem;margin:8px 0}
table.wt th{text-align:left;color:var(--dim);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--edge);font-size:.72rem;text-transform:uppercase;letter-spacing:.4px}
table.wt td{padding:7px 8px;border-bottom:1px solid #ffffff0d;line-height:1.4;vertical-align:top}
.sw{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:6px;border:1px solid #ffffff33}
.btn{display:inline-block;background:var(--card2);border:1px solid var(--edge);color:var(--txt);border-radius:10px;padding:10px 16px;font-size:.85rem;cursor:pointer;font-weight:600}
.btn.ember{background:linear-gradient(135deg,#c8501e,#ff7a3c);border-color:#ff7a3c}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
/* nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#10131b;border-top:1px solid var(--edge);display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--dim);font-size:.72rem;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
nav button svg{width:24px;height:24px}
nav button.on{color:var(--ember)}
h3.sec{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--ember2);margin:20px 4px 10px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.legend span{font-size:.72rem;background:var(--card2);border:1px solid var(--edge);border-radius:8px;padding:5px 9px}
textarea#ioBox{width:100%;background:#0a0c10;border:1px solid var(--edge);border-radius:10px;color:var(--txt);font-family:monospace;font-size:.75rem;padding:10px;min-height:70px;margin-top:8px}
.tag{display:inline-block;font-size:.66rem;padding:2px 7px;border-radius:99px;background:#ff7a3c22;color:var(--ember2);border:1px solid #ff7a3c44;margin-left:6px;vertical-align:1px}
</style>
</head>
<body>
<header>
  <h1>🏁 <b>240SX</b> LS3 + TR6060 Build</h1>
  <div class="pbarWrap"><div class="pbar" id="pbar"></div></div>
  <div class="psub"><span id="pTxt">0% complete</span><span id="pSteps"></span></div>
</header>
<main>
<!-- ============ PLAN TAB ============ -->
<div class="tab on" id="tab-plan"></div>
<!-- ============ PARTS TAB ============ -->
<div class="tab" id="tab-parts"></div>
<!-- ============ WIRING TAB ============ -->
<div class="tab" id="tab-wiring"></div>
<!-- ============ REF TAB ============ -->
<div class="tab" id="tab-ref"></div>
</main>
<nav>
  <button data-t="plan" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Plan</button>
  <button data-t="parts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Parts</button>
  <button data-t="wiring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Wiring</button>
  <button data-t="ref"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Ref</button>
</nav>
<script>
'use strict';
/* ================= STATE ================= */
const KEY='sx240_build_v1';
let S={checks:{},parts:{},open:{}};
try{ const raw=localStorage.getItem(KEY); if(raw) S=Object.assign(S,JSON.parse(raw)); }catch(e){}
function save(){ try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){} }

/* ================= WIRE COLOR CODE (this build's standard) ================= */
const WC={
  RED:['var(--w-red)','RED'], YEL:['var(--w-yel)','YELLOW'], ORN:['var(--w-orn)','ORANGE'],
  BRN:['var(--w-brn)','BROWN'], WHT:['var(--w-wht)','WHITE'], BLU:['var(--w-blu)','BLUE'],
  LTB:['var(--w-ltb)','LT BLUE'], GRN:['var(--w-grn)','GREEN'], VIO:['var(--w-vio)','VIOLET'],
  GRY:['var(--w-gry)','GRAY'], BLK:['var(--w-blk)','BLACK'], PNK:['var(--w-pnk)','PINK'], TAN:['var(--w-tan)','TAN']
};
function swatch(c){ return `<span class="sw" style="background:${WC[c][0]}"></span>${WC[c][1]}`; }

/* ================= SVG DIAGRAM HELPERS ================= */
const NS_W=700;
function dSvg(h,inner){ return `<div class="dwrap"><svg viewBox="0 0 ${NS_W} ${h}" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">${inner}</svg></div>`; }
function dBox(x,y,w,h,t,sub,accent){
  let s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="#151922" stroke="${accent||'#3a4560'}" stroke-width="1.5"/>`;
  s+=`<text x="${x+w/2}" y="${y+(sub?h/2-4:h/2+4)}" text-anchor="middle" fill="#e8e6df" font-size="12" font-weight="600">${t}</text>`;
  if(sub) s+=`<text x="${x+w/2}" y="${y+h/2+13}" text-anchor="middle" fill="#9aa3b5" font-size="9.5">${sub}</text>`;
  return s;
}
function dWire(pts,color,lbl,lx,ly){
  const p=pts.map(pt=>pt.join(',')).join(' ');
  let s=`<polyline points="${p}" fill="none" stroke="${WC[color]?WC[color][0].replace('var(--w-','').length?getCol(color):color:color}" stroke-width="2.5" stroke-linejoin="round"/>`;
  if(lbl){
    const mx=lx!==undefined?lx:(pts[0][0]+pts[pts.length-1][0])/2, my=ly!==undefined?ly:pts[0][1]-7;
    s+=`<text x="${mx}" y="${my}" text-anchor="middle" fill="#cfd4de" font-size="9.5" font-weight="600">${lbl}</text>`;
  }
  return s;
}
const COLHEX={RED:'#e04040',YEL:'#e8c821',ORN:'#f08a2c',BRN:'#9a6b3f',WHT:'#e8e8e8',BLU:'#3f8de0',LTB:'#7ec8f0',GRN:'#3fbf6a',VIO:'#a86ee8',GRY:'#9aa0aa',BLK:'#777',PNK:'#ef7fb2',TAN:'#cdb28a'};
function getCol(c){ return COLHEX[c]||c; }
function W(pts,c,lbl,lx,ly){
  const p=pts.map(pt=>pt.join(',')).join(' ');
  let s=`<polyline points="${p}" fill="none" stroke="${getCol(c)}" stroke-width="2.5" stroke-linejoin="round"/>`;
  if(lbl){ const mx=lx!==undefined?lx:(pts[0][0]+pts[pts.length-1][0])/2, my=ly!==undefined?ly:pts[0][1]-7;
    s+=`<text x="${mx}" y="${my}" text-anchor="middle" fill="#cfd4de" font-size="9.5" font-weight="600">${lbl}</text>`; }
  return s;
}
function dFuse(x,y,lbl){
  return `<rect x="${x-16}" y="${y-9}" width="32" height="18" rx="4" fill="#0a0c10" stroke="#e8c14b" stroke-width="1.5"/><line x1="${x-9}" y1="${y}" x2="${x+9}" y2="${y}" stroke="#e8c14b" stroke-width="2"/><text x="${x}" y="${y+22}" text-anchor="middle" fill="#e8c14b" font-size="9" font-weight="700">${lbl}</text>`;
}
function dGnd(x,y){
  return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y+8}" stroke="#777" stroke-width="2.5"/><line x1="${x-9}" y1="${y+8}" x2="${x+9}" y2="${y+8}" stroke="#777" stroke-width="2.5"/><line x1="${x-6}" y1="${y+12}" x2="${x+6}" y2="${y+12}" stroke="#777" stroke-width="2"/><line x1="${x-3}" y1="${y+16}" x2="${x+3}" y2="${y+16}" stroke="#777" stroke-width="1.5"/>`;
}
function dRelay(x,y,name){
  let s=`<rect x="${x}" y="${y}" width="96" height="76" rx="8" fill="#1b2130" stroke="#ff7a3c" stroke-width="1.5"/>`;
  s+=`<text x="${x+48}" y="${y+16}" text-anchor="middle" fill="#ffb35c" font-size="10" font-weight="700">${name}</text>`;
  s+=`<text x="${x+48}" y="${y+27}" text-anchor="middle" fill="#9aa3b5" font-size="8">in relay box</text>`;
  // pins: 30 left-mid, 87 right-mid, 86 top-inner, 85 bottom-inner
  s+=`<circle cx="${x}" cy="${y+48}" r="3.5" fill="#e8e6df"/><text x="${x+9}" y="${y+52}" fill="#e8e6df" font-size="9" font-weight="700">30</text>`;
  s+=`<circle cx="${x+96}" cy="${y+48}" r="3.5" fill="#e8e6df"/><text x="${x+87}" y="${y+52}" text-anchor="end" fill="#e8e6df" font-size="9" font-weight="700">87</text>`;
  s+=`<circle cx="${x+30}" cy="${y+76}" r="3.5" fill="#e8e6df"/><text x="${x+30}" y="${y+70}" text-anchor="middle" fill="#e8e6df" font-size="9" font-weight="700">86</text>`;
  s+=`<circle cx="${x+66}" cy="${y+76}" r="3.5" fill="#e8e6df"/><text x="${x+66}" y="${y+70}" text-anchor="middle" fill="#e8e6df" font-size="9" font-weight="700">85</text>`;
  // internals
  s+=`<line x1="${x+8}" y1="${y+48}" x2="${x+40}" y2="${y+40}" stroke="#9aa3b5" stroke-width="1.5"/><line x1="${x+44}" y1="${y+48}" x2="${x+88}" y2="${y+48}" stroke="#9aa3b5" stroke-width="1.5" stroke-dasharray="3 2"/>`;
  s+=`<rect x="${x+34}" y="${y+58}" width="28" height="10" fill="none" stroke="#9aa3b5" stroke-width="1.2"/>`;
  return s;
}
function dSwitch(x,y,lbl,sub){
  let s=`<rect x="${x-34}" y="${y-16}" width="68" height="32" rx="7" fill="#0a0c10" stroke="#7ec8f0" stroke-width="1.5"/>`;
  s+=`<line x1="${x-20}" y1="${y+6}" x2="${x+14}" y2="${y-8}" stroke="#7ec8f0" stroke-width="2"/><circle cx="${x-20}" cy="${y+6}" r="2.5" fill="#7ec8f0"/><circle cx="${x+16}" cy="${y+6}" r="2.5" fill="#7ec8f0"/>`;
  s+=`<text x="${x}" y="${y+30}" text-anchor="middle" fill="#7ec8f0" font-size="9" font-weight="700">${lbl}</text>`;
  if(sub) s+=`<text x="${x}" y="${y+41}" text-anchor="middle" fill="#9aa3b5" font-size="8">${sub}</text>`;
  return s;
}
function dRail(y,lbl,col){
  return `<line x1="20" y1="${y}" x2="90" y2="${y}" stroke="${getCol(col||'RED')}" stroke-width="3"/><text x="22" y="${y-8}" fill="${getCol(col||'RED')}" font-size="10" font-weight="700">${lbl}</text>`;
}

/* Whole-box overview: every relay slot with trigger (left, dashed) and output (right, colored).
   o={name,sub,feeds:[[color,label]],relays:[[name,fuse,outColor,outLabel,trigger]],fuses:[[label,outColor,outLabel]]} */
function boxOverview(o){
  const RH=52, FH=34;
  const inner=o.relays.length*RH + (o.fuses.length? 20+o.fuses.length*FH : 0);
  const H=104+inner+26;
  let s='';
  o.feeds.forEach((f,i)=>{
    const fx=240+i*130;
    s+=`<text x="${fx}" y="20" text-anchor="middle" fill="${getCol(f[0])}" font-size="9.5" font-weight="700">${f[1]}</text>`;
    s+=W([[fx,26],[fx,58]],f[0]);
  });
  s+=`<rect x="190" y="58" width="250" height="${inner+44}" rx="12" fill="#12151d" stroke="#ff7a3c" stroke-width="2"/>`;
  s+=`<text x="315" y="78" text-anchor="middle" fill="#ffb35c" font-size="12" font-weight="700">${o.name}</text>`;
  s+=`<text x="315" y="91" text-anchor="middle" fill="#9aa3b5" font-size="9">${o.sub}</text>`;
  let y=100;
  o.relays.forEach(r=>{
    const cy=y+18;
    s+=`<rect x="202" y="${y}" width="226" height="34" rx="7" fill="#1b2130" stroke="#3a4560"/>`;
    s+=`<text x="212" y="${cy+3}" fill="#e8e6df" font-size="10" font-weight="700">⚡ ${r[0]}</text>`;
    s+=`<rect x="384" y="${y+8}" width="38" height="18" rx="4" fill="#0a0c10" stroke="#e8c14b"/><text x="403" y="${y+21}" text-anchor="middle" fill="#e8c14b" font-size="8.5" font-weight="700">${r[1]}</text>`;
    s+=`<line x1="66" y1="${cy}" x2="202" y2="${cy}" stroke="#9aa3b5" stroke-width="1.5" stroke-dasharray="4 3"/>`;
    s+=`<text x="134" y="${cy-6}" text-anchor="middle" fill="#9aa3b5" font-size="8.5">${r[4]}</text>`;
    s+=W([[440,cy],[492,cy]],r[2]);
    s+=`<text x="497" y="${cy+3}" fill="#cfd4de" font-size="9.5">${r[3]}</text>`;
    y+=RH;
  });
  if(o.fuses.length){
    s+=`<text x="212" y="${y+10}" fill="#e8c14b" font-size="8.5" font-weight="700">FUSE-ONLY (no relay):</text>`;
    y+=20;
    o.fuses.forEach(f=>{
      const cy=y+12;
      s+=`<rect x="202" y="${y}" width="226" height="24" rx="6" fill="#10141c" stroke="#2a3245"/>`;
      s+=`<text x="212" y="${cy+3}" fill="#cfd4de" font-size="9">▭ ${f[0]}</text>`;
      s+=W([[440,cy],[492,cy]],f[1]);
      s+=`<text x="497" y="${cy+3}" fill="#cfd4de" font-size="9">${f[2]}</text>`;
      y+=FH;
    });
  }
  return dSvg(H,s);
}

/* Standard relay circuit diagram — the shape used by most circuits.
   o = {title, mainFuse, mainWire, coilFuse, coilSrc, trig, trigLbl, load, loadSub, loadWire, extra} */
function relayDiagram(o){
  let s='';
  // +12V feed rail top-left → fuse → pin 30
  s+=dRail(60,o.src||'+12V BATT');
  s+=W([[90,60],[150,60]],o.mainWire||'RED');
  s+=dFuse(170,60,o.mainFuse);
  s+=W([[186,60],[260,60],[260,108],[300,108]],o.mainWire||'RED',(o.mainWireLbl||''),240,95);
  // relay
  s+=dRelay(300,60,o.relay||'RELAY');
  // coil feed: IGN rail → coil fuse → 86
  s+=dRail(230,o.coilSrc||'+12V IGN','YEL');
  s+=W([[90,230],[140,230]],'YEL');
  s+=dFuse(160,230,o.coilFuse||'5A');
  s+=W([[176,230],[330,230],[330,136]],'YEL','to 86',255,222);
  // trigger on 85
  if(o.trig==='ground-switch'){
    s+=W([[366,136],[366,196]],'BLK');
    s+=dSwitch(366,216,o.trigLbl||'ROCKER',o.trigSub||'');
    s+=W([[366,232],[366,268]],'BLK');
    s+=dGnd(366,268);
  } else if(o.trig==='ecu-ground'){
    s+=W([[366,136],[366,180]],o.trigColor||'TAN');
    s+=dBox(316,180,100,34,o.trigLbl||'ECU TRIGGER',o.trigSub||'grounds when on','#3fbf6a');
    if(o.override){
      s+=W([[416,197],[470,197]],'BLK','override');
      s+=dSwitch(504,197,o.override,'parallel to gnd');
      s+=W([[538,197],[560,197],[560,240]],'BLK');
      s+=dGnd(560,240);
    }
  }
  // 87 → load → gnd
  s+=W([[396,108],[470,108]],o.loadWire,o.loadWireLbl||'',433,98);
  s+=dBox(470,84,150,48,o.load,o.loadSub);
  s+=W([[545,132],[545,168]],'BLK');
  s+=dGnd(545,168);
  return dSvg(300,s);
}

/* ================= DATA: BUILD PLAN (bare roller shell — wiring FIRST) ================= */
const PLAN=[
{id:'p0',title:'Phase 0 — Layout (mark everything before pulling wire)',steps:[
 ['p0a','Mark mounting spots with tape/paint pen: battery + kill switch + main fuse in trunk, Relay Box A in engine bay, Relay Box B + ground bus behind dash, ECU spot, gauge positions, rocker switch panel.'],
 ['p0b','Pick the firewall pass-through points (main harness, 8ga Box B feed, dash→Box A coil wires) and drill/grommet them now.'],

function wireRow(rows){
  let s='<table class="wt"><tr><th>Wire</th><th>Ga</th><th>From → To</th></tr>';
  rows.forEach(r=>{ s+=`<tr><td>${swatch(r[0])}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`; });
  return s+'</table>';
}

/* ================= DATA: REFERENCE ================= */
function refHTML(){
  let s='';
  s+='<h3 class="sec">Wire color code (this build)</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px">';
  s+=wireRow([
   ['RED','—','Constant battery power (fused)'],
   ['YEL','—','Ignition-switched power (from 80A master solenoid)'],
   ['ORN','—','Constant accessory (dome, memory, hazard, 12V socket)'],
   ['WHT','—','Low beams + pop-up motors'],
   ['BLU','—','High beams / wiper motor'],
   ['BRN','—','Running lights (park/tail/plate)'],
   ['GRN','—','Left turn / brake / horn'],
   ['VIO','—','Right turn / starter signal'],
   ['LTB','—','Reverse lights / fans'],
   ['PNK','—','Fuel pump / washer'],
   ['TAN','—','Gauge sender signals'],
   ['GRY','—','Illumination (dimmer) / park feeds'],
   ['BLK','—','Ground. Always. No exceptions.'],
  ]);
  s+='<div class="note">Print this or keep the page open while wiring. Label both ends of every run anyway (you bought 300 labels).</div></div></div>';

  s+='<h3 class="sec">Relay Box A — engine bay (6 relay / 11 fuse)</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px"><table class="wt"><tr><th>Slot</th><th>Circuit</th><th>Fuse</th></tr>'+
  [['R1','Low beams','20A'],['R2','High beams','20A'],['R3','Fan 1','30A'],['R4','Fan 2 (or spare)','30A'],['R5','Fuel pump','15A'],['R6','Pop-up motors','15A'],['F—','Relay coil feeds 5A each, washer 10A','']]
  .map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')+'</table></div></div>';

  s+='<h3 class="sec">Relay Box B — interior (4 relay / 12 fuse)</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px"><table class="wt"><tr><th>Slot</th><th>Circuit</th><th>Fuse</th></tr>'+
  [['R1','Start relay','30A'],['R2','Park/running lights','15A'],['R3','Wipers','20A'],['R4','Horn','15A'],['F—','Gauges 5A, turn 10A, hazard 10A, brake 10A, reverse 10A, dome 5A, 12V skt 15A, lockout 5A, stereo 10A','']]
  .map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')+'</table></div></div>';

  s+='<h3 class="sec">Relay pins — memorize once</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px"><table class="wt">'+
  [['30','Power IN (fused from a bus)'],['87','Power OUT (to the load)'],['86','Coil + (fused IGN, thin wire)'],['85','Coil − (your switch/trigger grounds this)']]
  .map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td></tr>`).join('')+'</table><div class="note">Every rocker in this build just grounds pin 85 of some relay. Thin 16ga wire at the panel, heavy current stays in the boxes. One pattern, fourteen circuits.</div></div></div>';

  s+='<h3 class="sec">Wire gauge quick chart</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px"><table class="wt"><tr><th>Ga</th><th>Good for</th><th>Used on</th></tr>'+
  [['2/0','300A+','Battery run, engine ground'],['4','100A','Ground straps'],['8','60–80A','Box feeds, master solenoid'],['10','40A','Fans'],['12','25A','Pump, starter sig, headlights, 12V skt'],['14','15A','Lamps, horn, wipers'],['16','10A','Turns, small loads, relay coils'],['18','5A','Senders, triggers, dimmer']]
  .map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')+'</table></div></div>';

  s+='<h3 class="sec">Settings cheat sheet</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px"><table class="wt">'+
  [['GlowShift tach','8-cylinder mode; signal from swap harness tach wire'],
   ['GlowShift fuel','Meter the stock sender: note ohms at full + empty, pick matching range in gauge setup'],
   ['SGI-100BT','Pre-wired by harness shop for speed only; calibrate ratio dips vs GPS at a steady 40 mph'],
   ['Fan temps','In the tune: 185°F on / 175°F off starting point'],
   ['Fuel pressure','LS3 target ≈ 58 psi at the rail'],
   ['Oil pressure','Warm idle ~25-35 psi, ~20 psi per 1000 rpm rule of thumb'],
   ['Torque: driveshaft','Safety-check bolts at 50 mi after install']]
  .map(r=>`<tr><td style="white-space:nowrap"><b>${r[0]}</b></td><td>${r[1]}</td></tr>`).join('')+'</table></div></div>';

  s+='<h3 class="sec">Backup / restore progress</h3><div class="card open"><div class="cbody" style="display:block;padding-top:12px">'+
  '<div class="btnrow"><button class="btn ember" onclick="exportState()">Export</button><button class="btn" onclick="importState()">Import</button><button class="btn" style="color:var(--need)" onclick="resetState()">Reset all</button></div>'+
  '<textarea id="ioBox" placeholder="Export dumps your progress here as text — copy it somewhere safe. Paste it back and hit Import on another device."></textarea>'+
  '<div class="note">Progress lives in this browser’s storage only. Export before clearing browser data or switching phones.</div></div></div>';
  return s;
}

/* ================= RENDER ================= */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function renderPlan(){
  const el=document.getElementById('tab-plan');
  let h='<div class="note" style="margin-top:2px"><b>S13 240SX · LS3 (2010 Camaro) · TR6060 · bare roller shell.</b> Wiring-first order: backbone + every wire run goes in while the shell is empty, lights get tested on battery power alone, drivetrain drops in after. Check off steps as you go — saves automatically.</div>';
  PLAN.forEach(ph=>{
    const total=ph.steps.length, done=ph.steps.filter(st=>S.checks[st[0]]).length;
    const open=S.open[ph.id]?' open':'';
    h+=`<div class="card${open}" id="card-${ph.id}"><div class="chead" onclick="togglePh('${ph.id}')"><h2>${ph.title}</h2><span class="badge${done===total?' done':''}">${done}/${total}</span><span class="chev">▶</span></div><div class="cbody">`;
    ph.steps.forEach(st=>{
      const d=S.checks[st[0]]?' done':'';
      h+=`<div class="step${d}" id="step-${st[0]}"><div class="ck" onclick="toggleStep('${st[0]}')">✓</div><div class="st">${st[1]}${st[2]?`<small>${st[2]}</small>`:''}</div></div>`;
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}
function renderParts(){
  const el=document.getElementById('tab-parts');
  let have=0,total=0;
  PARTS.forEach(g=>g.items.forEach(it=>{ total++; if(pStat(it)===2)have++; }));
  let h=`<div class="note" style="margin-top:2px">Tap a status chip to cycle <b style="color:var(--need)">NEED</b> → <b style="color:var(--warn)">ORDERED</b> → <b style="color:var(--ok)">HAVE</b>. ${have}/${total} in hand.</div>`;
  PARTS.forEach((g,gi)=>{
    h+=`<h3 class="sec">${g.grp}</h3><div class="card open"><div class="cbody" style="display:block;padding-top:4px">`;
    g.items.forEach(it=>{
      const st=pStat(it), lbl=['NEED','ORDERED','HAVE'][st];
      h+=`<div class="pitem"><div class="pn">${it[1]}${it[3]?`<small>${it[3]}</small>`:''}</div><div class="pstat s${st}" onclick="cycleP('${it[0]}')">${lbl}</div></div>`;
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}
function pStat(it){ return S.parts[it[0]]!==undefined?S.parts[it[0]]:it[2]; }
function renderWiring(){
  const el=document.getElementById('tab-wiring');
  let h='<div class="note" style="margin-top:2px"><b>Full custom rewire</b> — no factory harness colors here; these diagrams define YOUR color code (see Ref tab). Every rocker switches a relay coil ground: thin wires at the panel, heavy current in the relay boxes. Diagrams scroll sideways on phone.</div>';
  h+='<div class="legend"><span>'+swatch('RED')+' batt</span><span>'+swatch('YEL')+' ign</span><span>'+swatch('BLK')+' gnd</span><span>⚡ relay</span><span style="color:#e8c14b">▭ fuse</span><span style="color:#7ec8f0">⧄ switch</span></div>';
  CIRCUITS.forEach(c=>{
    const open=S.open[c.id]?' open':'';
    h+=`<div class="card${open}" id="card-${c.id}"><div class="chead" onclick="togglePh('${c.id}')"><h2>${c.title}${c.badge?`<span class="tag">${c.badge}</span>`:''}</h2><span class="chev">▶</span></div><div class="cbody" id="cb-${c.id}"></div></div>`;
  });
  el.innerHTML=h;
  CIRCUITS.forEach(c=>{ document.getElementById('cb-'+c.id).innerHTML=(c.simple?`<div class="note" style="border-left-color:var(--ok);margin-top:12px"><b>Hook-up:</b> ${c.simple}</div>`:'')+c.body(); });
}
function renderRef(){ document.getElementById('tab-ref').innerHTML=refHTML(); }
function renderProgress(){
  let total=0,done=0;
  PLAN.forEach(ph=>ph.steps.forEach(st=>{ total++; if(S.checks[st[0]])done++; }));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('pTxt').textContent=pct+'% complete';
  document.getElementById('pSteps').textContent=done+' / '+total+' steps';
}

/* ================= INTERACTION ================= */
window.togglePh=function(id){
  S.open[id]=!S.open[id]; save();
  const c=document.getElementById('card-'+id); if(c) c.classList.toggle('open',!!S.open[id]);
};
window.toggleStep=function(id){
  S.checks[id]=S.checks[id]?0:1; save();
  const el=document.getElementById('step-'+id); if(el) el.classList.toggle('done',!!S.checks[id]);
  // refresh badge counts
  renderPlanBadges(); renderProgress();
};
function renderPlanBadges(){
  PLAN.forEach(ph=>{
    const c=document.getElementById('card-'+ph.id); if(!c) return;
    const done=ph.steps.filter(st=>S.checks[st[0]]).length;
    const b=c.querySelector('.badge'); b.textContent=done+'/'+ph.steps.length;
    b.classList.toggle('done',done===ph.steps.length);
  });
}
window.cycleP=function(id){
  let cur=S.parts[id];
  if(cur===undefined){ // find default
    outer: for(const g of PARTS) for(const it of g.items) if(it[0]===id){ cur=it[2]; break outer; }
  }
  S.parts[id]=(cur+1)%3; save(); renderParts();
};
window.exportState=function(){ document.getElementById('ioBox').value=JSON.stringify(S); };
window.importState=function(){
  try{ const v=JSON.parse(document.getElementById('ioBox').value); if(v&&typeof v==='object'){ S=Object.assign({checks:{},parts:{},open:{}},v); save(); renderAll(); alert('Imported.'); } }
  catch(e){ alert('Bad data — paste a full export string.'); }
};
window.resetState=function(){ if(confirm('Wipe ALL progress on this device?')){ S={checks:{},parts:{},open:{}}; save(); renderAll(); } };

document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('tab-'+b.dataset.t).classList.add('on');
    window.scrollTo(0,0);
  });
});

function renderAll(){ renderPlan(); renderParts(); renderWiring(); renderRef(); renderProgress(); }
renderAll();
</script>
</body>
</html>
