<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Smokey Bones &amp; the House of Nine Lives</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='36' r='22' fill='%238a8fa8'/%3E%3Cpath d='M14 26 L10 8 L26 16 Z' fill='%238a8fa8'/%3E%3Cpath d='M50 26 L54 8 L38 16 Z' fill='%238a8fa8'/%3E%3Ccircle cx='24' cy='34' r='3' fill='%23ffd166'/%3E%3Ccircle cx='40' cy='34' r='3' fill='%23ffd166'/%3E%3C/svg%3E">
<style>
/* ============ [CSS] Smokey Bones ============ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0e1a; --bg2:#141629; --panel:#1a1c33; --panel2:#232647;
  --ink:#e8e6f0; --ink-dim:#9a97b8; --gold:#ffd166; --gold-dim:#b3924a;
  --ember:#ff9e5e; --ghost:#9fd8ff; --good:#7ee0a3; --bad:#ff7a7a;
  --line:#33365e;
}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  touch-action:manipulation; user-select:none; -webkit-user-select:none;
  overflow:hidden;
}
#app{height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative}

/* HUD */
#hud{display:flex;align-items:center;gap:8px;padding:10px 12px 6px;flex:0 0 auto}
#hudTitle{flex:1;min-width:0}
#hudTitle .rn{font-size:15px;font-weight:700;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hudTitle .ch{font-size:10.5px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:1.2px}
.hbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;
  min-width:40px;height:40px;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0 8px}
.hbtn:active{background:var(--panel2)}
#flameRow{display:flex;gap:3px;justify-content:center;padding:2px 12px 6px;flex:0 0 auto}
.flame{width:22px;height:22px;opacity:.22;filter:grayscale(1);transition:all .6s}
.flame.lit{opacity:1;filter:none;animation:flick 2.2s ease-in-out infinite}
@keyframes flick{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* Scene */
#sceneWrap{flex:1;min-height:0;position:relative;padding:0 8px}
#scene{width:100%;height:100%;display:block;border-radius:14px;background:var(--bg2)}
.hot{fill:transparent;cursor:pointer}
.hot:active{fill:rgba(255,209,102,.10)}
#roomNav{position:absolute;left:14px;bottom:10px;display:flex;gap:6px;z-index:5}
.navb{width:38px;height:38px;border-radius:10px;background:rgba(20,22,41,.88);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:var(--ink-dim)}
.navb.cur{border-color:var(--gold);color:var(--gold)}

/* Inventory */
#invBar{flex:0 0 auto;padding:8px 10px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;overflow-x:auto;min-height:70px;align-items:center}
#invBar:empty::after{content:"Your pockets are empty. Tap things. Look under things.";color:var(--ink-dim);font-size:12px;font-style:italic;padding-left:6px}
.invItem{flex:0 0 auto;width:54px;height:54px;border-radius:12px;background:var(--panel);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.invItem svg{width:38px;height:38px}
.invItem.sel{border-color:var(--gold);box-shadow:0 0 12px rgba(255,209,102,.35);background:var(--panel2)}

/* Overlays & modals */
.ov{position:fixed;inset:0;background:rgba(8,9,18,.82);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.ov.show{display:flex}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:420px;width:100%;
  max-height:86dvh;overflow-y:auto;padding:18px;position:relative;box-shadow:0 18px 60px rgba(0,0,0,.6)}
.card h3{font-size:16px;margin-bottom:8px;color:var(--gold)}
.card .body{font-size:14px;line-height:1.55;color:var(--ink)}
.xbtn{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:9px;background:var(--panel2);
  border:1px solid var(--line);color:var(--ink-dim);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
.btn.gold{background:linear-gradient(160deg,#4a3a14,#2e2410);border-color:var(--gold-dim);color:var(--gold)}
.btn:active{transform:scale(.97)}
.btn.wide{width:100%}
.mut{color:var(--ink-dim);font-size:12.5px;font-style:italic}

/* Story overlay */
#storyOv{background:rgba(8,9,18,.96);flex-direction:column;z-index:80}
#storyArt{width:min(76vw,300px);height:min(56vw,220px);margin-bottom:18px}
#storyArt svg{width:100%;height:100%}
#storyTxt{font-family:Georgia,'Times New Roman',serif;font-size:16.5px;line-height:1.7;color:var(--ink);
  max-width:420px;text-align:center;min-height:120px;padding:0 10px;white-space:pre-wrap}
#storyTap{margin-top:22px;color:var(--ink-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}

/* Toast */
#toast{position:fixed;left:50%;top:14px;transform:translateX(-50%) translateY(-80px);background:var(--panel2);
  border:1px solid var(--gold-dim);color:var(--ink);border-radius:12px;padding:10px 18px;font-size:13.5px;z-index:90;
  transition:transform .35s cubic-bezier(.2,.9,.3,1.3);max-width:88vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast b{color:var(--gold)}

/* Puzzle widgets */
.padGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.padGrid button{height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-size:20px;font-weight:700;cursor:pointer}
.padGrid button:active{background:#2d3160}
.codeDisp{font-family:'Courier New',monospace;font-size:30px;letter-spacing:12px;text-align:center;background:#0a0b16;
  border:1px solid var(--line);border-radius:12px;padding:12px 4px 12px 14px;margin-top:12px;color:var(--gold);min-height:58px}
.wheelRow{display:flex;gap:8px;justify-content:center;margin-top:14px}
.wheel{display:flex;flex-direction:column;align-items:center;gap:6px}
.wheel .wv{width:50px;height:58px;border-radius:12px;background:#0a0b16;border:1px solid var(--line);color:var(--gold);
  font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}
.wheel button{width:50px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-size:15px;cursor:pointer}
.dialRow{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.stove{display:flex;flex-direction:column;align-items:center;gap:5px}
.stove .lbl{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px}
.slideGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:14px auto 0;width:min(76vw,270px)}
.slideGrid .tile{aspect-ratio:1;border-radius:10px;background:var(--panel2);border:1px solid var(--line);cursor:pointer;overflow:hidden;padding:0}
.slideGrid .tile.blank{background:transparent;border-style:dashed;opacity:.35;cursor:default}
.slideGrid .tile svg{width:100%;height:100%;display:block}
.wireBox{display:flex;justify-content:space-between;margin-top:14px;position:relative;min-height:250px}
.wcol{display:flex;flex-direction:column;gap:14px;z-index:2}
.wnode{width:74px;height:40px;border-radius:10px;border:2px solid var(--line);background:var(--panel2);color:var(--ink);
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.wnode.sel{border-color:var(--gold);box-shadow:0 0 10px rgba(255,209,102,.4)}
#wireSvg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.chimeRow{display:flex;gap:10px;justify-content:center;margin-top:14px}
.chime{width:52px;height:120px;border-radius:26px;border:2px solid var(--line);cursor:pointer;position:relative}
.chime:active{transform:translateY(3px)}
.seqDots{display:flex;gap:8px;justify-content:center;margin-top:14px;min-height:18px}
.seqDots span{width:14px;height:14px;border-radius:50%;background:var(--panel2);border:1px solid var(--line)}
.orderSlots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.oslot{width:72px;height:58px;border-radius:12px;border:1.5px dashed var(--line);display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:10px;color:var(--ink-dim);cursor:pointer;text-align:center;padding:2px}
.oslot.filled{border-style:solid;border-color:var(--gold-dim);color:var(--gold);background:rgba(255,209,102,.07)}
.flamePick{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.fpick{padding:8px 10px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);font-size:11.5px;cursor:pointer}
.fpick.sel{border-color:var(--gold);color:var(--gold)}
.fpick.used{opacity:.28;pointer-events:none}
.hintTier{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.hintTier .ht{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ghost);margin-bottom:4px}
.hintTier .revealBtn{background:none;border:none;color:var(--gold);font-size:13px;cursor:pointer;padding:0;font-weight:600}
.jpage{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;background:rgba(10,11,22,.5)}
.jpage h4{font-size:13px;color:var(--gold);margin-bottom:4px;font-family:Georgia,serif}
.jpage p{font-size:13px;line-height:1.6;color:var(--ink);font-family:Georgia,serif}
.shake{animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.glowGold{filter:drop-shadow(0 0 6px rgba(255,209,102,.8))}
#devPanel{position:fixed;right:6px;top:60px;z-index:99;background:rgba(20,22,41,.95);border:1px solid var(--bad);
  border-radius:10px;padding:8px;display:none;flex-direction:column;gap:5px;max-height:70vh;overflow-y:auto}
#devPanel button{font-size:11px;padding:5px 8px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:7px;cursor:pointer}
.starTap{cursor:pointer}
.mirrorCell{cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="hudTitle"><div class="rn" id="roomName">…</div><div class="ch" id="chapName">…</div></div>
    <div class="hbtn" id="btnJournal" title="Journal">📖</div>
    <div class="hbtn" id="btnHint" title="Ask Smokey">🐾</div>
    <div class="hbtn" id="btnMenu" title="Menu">☰</div>
  </div>
  <div id="flameRow"></div>
  <div id="sceneWrap">
    <svg id="scene" viewBox="0 0 390 560" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="roomNav"></div>
  </div>
  <div id="invBar"></div>
</div>

<div class="ov" id="storyOv">
  <div id="storyArt"></div>
  <div id="storyTxt"></div>
  <div id="storyTap">tap to continue</div>
</div>

<div class="ov" id="modalOv"><div class="card" id="modalCard"></div></div>
<div class="ov" id="journalOv"><div class="card" id="journalCard"></div></div>
<div class="ov" id="hintOv"><div class="card" id="hintCard"></div></div>
<div class="ov" id="menuOv"><div class="card" id="menuCard"></div></div>
<div id="toast"></div>
<div id="devPanel"></div>

<script>
"use strict";
/* ================= [JS-01] CORE STATE ================= */
const SKEY = "smokeybones_save_v1";
const VERSION = "1.0.0";

function defaultState(){
  return {
    v:1, room:"living", flames:{}, items:{}, used:{}, solved:{}, flags:{},
    journal:{}, hintsRevealed:{}, started:0, ended:false, intro:false,
  };
}
let S = defaultState();
function save(){ try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem(SKEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    S = Object.assign(defaultState(), d);
    S.flames=S.flames||{}; S.items=S.items||{}; S.used=S.used||{}; S.solved=S.solved||{};
    S.flags=S.flags||{}; S.journal=S.journal||{}; S.hintsRevealed=S.hintsRevealed||{};
    return true;
  }catch(e){ return false; }
}
function resetAll(){ localStorage.removeItem(SKEY); location.reload(); }

let selectedItem = null;

/* ================= [JS-02] AUDIO ================= */
let AC = null;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(freq, dur, type, vol, when){
  const c = ac(); if(!c) return;
  if(c.state==="suspended") c.resume();
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  g.gain.value=0; o.connect(g); g.connect(c.destination);
  const t=c.currentTime+(when||0);
  g.gain.linearRampToValueAtTime(vol||0.14, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.4));
  o.start(t); o.stop(t+(dur||0.4)+0.05);
}
const sfx = {
  tap(){ tone(320,0.08,"triangle",0.05); },
  unlock(){ tone(420,0.12,"square",0.06); tone(640,0.25,"triangle",0.09,0.09); },
  item(){ tone(660,0.18,"sine",0.1); tone(880,0.3,"sine",0.08,0.12); },
  wrong(){ tone(160,0.28,"sawtooth",0.07); },
  flame(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.5,"sine",0.09,i*0.13)); },
  bell(){ tone(1720,1.6,"sine",0.12); tone(2580,1.1,"sine",0.05,0.02); },
  chime(f){ tone(f,1.1,"sine",0.12); tone(f*2.01,0.7,"sine",0.04); },
};

/* ================= [JS-03] TOAST / MODAL / STORY ================= */
let toastT=null;
function toast(html){
  const t=document.getElementById("toast");
  t.innerHTML=html; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"), 2600);
}
function openModal(html){
  const c=document.getElementById("modalCard");
  c.innerHTML = '<div class="xbtn" onclick="closeModal()">✕</div>'+html;
  document.getElementById("modalOv").classList.add("show");
}
function closeModal(){ document.getElementById("modalOv").classList.remove("show"); }

let storyQueue=[], storyCb=null, typing=false, typeTimer=null, curStoryText="";
function showStory(beats, cb){
  storyQueue = beats.slice(); storyCb = cb||null;
  document.getElementById("storyOv").classList.add("show");
  nextBeat();
}
function nextBeat(){
  if(typing){ // finish instantly
    clearInterval(typeTimer); typing=false;
    document.getElementById("storyTxt").textContent = curStoryText;
    return;
  }
  if(!storyQueue.length){
    document.getElementById("storyOv").classList.remove("show");
    const cb=storyCb; storyCb=null; if(cb) cb();
    return;
  }
  const b = storyQueue.shift();
  document.getElementById("storyArt").innerHTML = b.art || "";
  const el = document.getElementById("storyTxt");
  curStoryText = b.text; el.textContent="";
  let i=0; typing=true;
  clearInterval(typeTimer);
  typeTimer = setInterval(()=>{
    i+=2; el.textContent = curStoryText.slice(0,i);
    if(i>=curStoryText.length){ clearInterval(typeTimer); typing=false; }
  }, 24);
}
document.getElementById("storyOv").addEventListener("click", nextBeat);

/* ================= [JS-04] ITEMS ================= */
const ITEMS = {
  bell:{ name:"Smokey's Collar Bell", desc:"A tiny brass bell on a smoke-gray collar. It still smells faintly of her. It rings even when nothing moves it.",
    svg:'<svg viewBox="0 0 64 64"><defs><radialGradient id="ibell" cx="40%" cy="30%"><stop offset="0%" stop-color="#ffe9a8"/><stop offset="100%" stop-color="#b3924a"/></radialGradient></defs><path d="M10 30 Q32 14 54 30" fill="none" stroke="#6b7089" stroke-width="7" stroke-linecap="round"/><circle cx="32" cy="40" r="13" fill="url(#ibell)"/><circle cx="32" cy="46" r="3" fill="#5c4718"/><rect x="29" y="26" width="6" height="6" rx="2" fill="#8a7133"/></svg>'},
  brasskey:{ name:"Brass Key", desc:"Small, warm to the touch. Fell out of the clock like it had been waiting.",
    svg:'<svg viewBox="0 0 64 64"><circle cx="20" cy="24" r="10" fill="none" stroke="#d4a94e" stroke-width="5"/><path d="M27 31 L48 52 M42 46 l6 -6 M36 40 l5 -5" stroke="#d4a94e" stroke-width="5" stroke-linecap="round"/></svg>'},
  matchbox:{ name:"Matchbox", desc:"“STRIKE GENTLY.” Half full. She used to bat these off the mantel one by one.",
    svg:'<svg viewBox="0 0 64 64"><rect x="10" y="24" width="44" height="24" rx="4" fill="#7a4a2b"/><rect x="10" y="24" width="44" height="9" rx="4" fill="#a8683c"/><rect x="36" y="12" width="4" height="18" rx="2" fill="#d8c9a0" transform="rotate(28 38 21)"/><circle cx="43" cy="13" r="4.5" fill="#ff9e5e"/></svg>'},
  hallkey:{ name:"Hallway Key", desc:"Opens the door to the kitchen. Someone tied a scrap of ribbon to it — her favorite ribbon.",
    svg:'<svg viewBox="0 0 64 64"><circle cx="20" cy="22" r="9" fill="none" stroke="#9fb0c9" stroke-width="5"/><path d="M26 29 L46 50 M40 44 l6 -6" stroke="#9fb0c9" stroke-width="5" stroke-linecap="round"/><path d="M14 14 q6 -8 10 0" fill="none" stroke="#ff7a7a" stroke-width="3"/></svg>'},
  chartL:{ name:"Star Chart (left half)", desc:"Torn parchment. Stars, and half a cat-shaped constellation labeled “FELIS MINOR — the Little Smoke.”",
    svg:'<svg viewBox="0 0 64 64"><path d="M12 10 h30 l-6 44 h-24 z" fill="#e8dbb5"/><circle cx="22" cy="22" r="2" fill="#3b3a68"/><circle cx="30" cy="30" r="2" fill="#3b3a68"/><circle cx="20" cy="40" r="2" fill="#3b3a68"/><path d="M22 22 L30 30 L20 40" stroke="#3b3a68" stroke-width="1" fill="none"/></svg>'},
  chartR:{ name:"Star Chart (right half)", desc:"The other half of the torn chart. The tail end of the Little Smoke.",
    svg:'<svg viewBox="0 0 64 64"><path d="M22 10 h30 v44 h-24 z" fill="#e8dbb5"/><circle cx="36" cy="24" r="2" fill="#3b3a68"/><circle cx="44" cy="36" r="2" fill="#3b3a68"/><path d="M36 24 L44 36" stroke="#3b3a68" stroke-width="1" fill="none"/></svg>'},
  chart:{ name:"Star Chart — Felis Minor", desc:"Taped back together. Five stars form a little cat. Tiny numbers mark the order: 1 at her eye, 5 at the tip of her tail. “Begin at her eye. End at her tail.”", inspect:"chartArt",
    svg:'<svg viewBox="0 0 64 64"><rect x="10" y="8" width="44" height="48" rx="3" fill="#e8dbb5"/><circle cx="22" cy="20" r="2.5" fill="#3b3a68"/><circle cx="32" cy="26" r="2" fill="#3b3a68"/><circle cx="26" cy="38" r="2" fill="#3b3a68"/><circle cx="38" cy="40" r="2" fill="#3b3a68"/><circle cx="46" cy="30" r="2" fill="#3b3a68"/><path d="M22 20 L32 26 L26 38 L38 40 L46 30" stroke="#3b3a68" stroke-width="1.2" fill="none"/></svg>'},
  treats:{ name:"Tuna Treats", desc:"Her brand. The bag crinkles and somewhere, you swear, a bell jingles in reply.",
    svg:'<svg viewBox="0 0 64 64"><path d="M16 14 h32 l-4 38 h-24 z" fill="#4a7ab5"/><path d="M16 14 h32 l-1 8 h-30 z" fill="#6b9bd6"/><ellipse cx="32" cy="38" rx="10" ry="6" fill="#e8dbb5"/><path d="M24 38 q8 -8 16 0 q-8 8 -16 0" fill="#c9b585"/></svg>'},
  silverkey:{ name:"Small Silver Key", desc:"Delicate, ornate. Too fancy for a kitchen. This opens something that holds paper.",
    svg:'<svg viewBox="0 0 64 64"><circle cx="20" cy="22" r="8" fill="none" stroke="#c9d4e8" stroke-width="4"/><circle cx="20" cy="22" r="3" fill="none" stroke="#c9d4e8" stroke-width="2"/><path d="M25 28 L46 50 M40 44 l5 -5 M34 38 l4 -4" stroke="#c9d4e8" stroke-width="4" stroke-linecap="round"/></svg>'},
  garagekey:{ name:"Garage Key", desc:"On a rubber fob shaped like a tire. The garage. Of course the garage.",

  j_thief:{ t:"Year One — The Breakfast Thief", p:"First week home, this six-pound kitten stole a full strip of bacon off my plate and ate it under the couch while making direct eye contact. I couldn’t even be mad. From that day on breakfast was a negotiation and I never once won. Three scoops of kibble, one tin of silver tuna, four treats — never five, she’d leave the fifth as an insult — and 4 a.m. yowling, free of charge."},

  j_inspector:{ t:"Year Four — The Parts Inspector", p:"Every box that came through the door required her personal sign-off: full body loaf, minimum ten minutes, no exceptions. New struts? Inspected. Timing chain? Inspected. The one time I unpacked a box without letting her sit in it first, she didn’t speak to me for a day and a half. Quality control is a lifestyle."},

function uiKeypad(title, bodyHTML, len, code, onWin){

const FISH_ART='<g><rect width="240" height="240" fill="#f0e6c8"/><g stroke="#6b4e2e" stroke-width="7" fill="none" stroke-linecap="round"><path d="M30 120 q45 -62 105 -62 q40 0 62 30 M30 120 q45 62 105 62 q40 0 62 -30"/><path d="M197 88 l30 -26 l-6 58 l6 58 l-30 -26"/><path d="M45 120 h150 M75 78 v84 M105 66 v108 M135 62 v116 M165 70 v100"/></g><circle cx="62" cy="100" r="9" fill="#3b3a68"/><path d="M40 58 q10 18 6 30 M206 120 h18" stroke="#6b4e2e" stroke-width="7" fill="none" stroke-linecap="round"/></g>';
function fishTile(idx){
  const r=Math.floor(idx/3), c=idx%3;
  return '<svg viewBox="'+(c*80)+' '+(r*80)+' 80 80">'+FISH_ART
   +'<text x="'+(c*80+8)+'" y="'+(r*80+16)+'" font-size="11" fill="#a89468">'+(idx+1)+'</text></svg>';
}
let slBoard=null;
function uiSlide(){
  if(!slBoard){
    slBoard=[0,1,2,3,4,5,6,7,8]; // value 8 = blank; positions index
    // shuffle with random valid moves
    for(let n=0;n<160;n++){
      const bi=slBoard.indexOf(8), r=Math.floor(bi/3), c=bi%3;
      const opts=[];
      if(r>0)opts.push(bi-3); if(r<2)opts.push(bi+3); if(c>0)opts.push(bi-1); if(c<2)opts.push(bi+1);
      const pick=opts[Math.floor(Math.random()*opts.length)];
      slBoard[bi]=slBoard[pick]; slBoard[pick]=8;
    }
  }
  openModal('<h3>The Pantry Lock</h3>'
   +'<div class="body">Nine sliding tiles set into the door — a scrambled mosaic. You tiled this floor patch yourself after she pried the originals up hunting a bug, and you scratched tiny numbers in the corners like a coward.</div>'
   +(S.flags.sawFish?'<div class="mut" style="margin-top:6px">Per her photo on the fridge: it should form the fish skeleton, facing left.</div>':'<div class="mut" style="margin-top:6px">What is it supposed to look like? There must be a picture of the finished thing somewhere…</div>')
   +'<div class="slideGrid" id="slGrid"></div>');
  drawSlide();
}
function drawSlide(){
  const g=document.getElementById("slGrid"); if(!g) return;
  g.innerHTML = slBoard.map((v,i)=> v===8
    ? '<button class="tile blank"></button>'
    : '<button class="tile" data-p="'+i+'">'+fishTile(v)+'</button>').join("");
  g.querySelectorAll(".tile[data-p]").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.dataset.p, bi=slBoard.indexOf(8);
    const r=Math.floor(i/3),c=i%3, br=Math.floor(bi/3),bc=bi%3;
    if(Math.abs(r-br)+Math.abs(c-bc)===1){
      slBoard[bi]=slBoard[i]; slBoard[i]=8; sfx.tap(); drawSlide();
      if(slBoard.every((v,idx)=>v===idx)){
        S.solved.pantry=1; save(); sfx.unlock();
        setTimeout(()=>{ closeModal(); renderAll(); toast("The mosaic completes and the fish practically swims. <b>The pantry unlocks.</b> Tap it to open."); },350);
      }
    }
  }));
}

const WIRE_COLORS=[["RED","#ff7a7a"],["BLUE","#6b9bd6"],["YEL","#ffd166"],["GRN","#7ee0a3"],["BLK","#8a92ad"]];
const WIRE_TERMS=["IGN","ECU","FUEL","FAN","GND"];
const WIRE_ANSWER={ YEL:"IGN", BLUE:"ECU", RED:"FUEL", GRN:"FAN", BLK:"GND" };
let wSel=null, wMap={};
function uiWires(){
  wSel=null; wMap={};
  openModal('<h3>The Harness</h3>'
   +'<div class="body">Five leads, five terminals. Tap a wire, then a terminal. Get all five right and the short clears.'
   +(hasItem("wirecard")?' Your diagram card is in your pockets — tap it twice to read it.':' You know you wrote yourself a diagram for this. It’s in the toolbox, probably. Everything is in the toolbox.')+'</div>'
   +'<div class="wireBox"><svg id="wireSvg"></svg>'
   +'<div class="wcol" id="wcL"></div><div class="wcol" id="wcR"></div></div>'
   +'<button class="btn gold wide" id="wTest">TEST CIRCUIT</button>');
  drawWires();
  document.getElementById("wTest").onclick=()=>{
    if(Object.keys(wMap).length<5){ sfx.wrong(); toast("Half a harness is worse than none. Connect all five."); return; }
    const ok = Object.keys(WIRE_ANSWER).every(c=>wMap[c]===WIRE_ANSWER[c]);
    if(ok){ S.solved.wires=1; save(); sfx.unlock(); closeModal(); renderAll();
      toast("No sparks. No smoke. The short is <b>cleared</b> — now hit the fuse box."); }
    else { sfx.wrong(); wMap={}; wSel=null; drawWires(); toast("POP. A spark, a smell, a lesson. The connections reset."); }
  };
}
function drawWires(){
  const L=document.getElementById("wcL"), R=document.getElementById("wcR");
  L.innerHTML=WIRE_COLORS.map(w=>'<div class="wnode'+(wSel===w[0]?" sel":"")+'" data-c="'+w[0]+'" style="border-color:'+w[1]+';color:'+w[1]+'">'+w[0]+'</div>').join("");
  R.innerHTML=WIRE_TERMS.map(t=>'<div class="wnode" data-t="'+t+'">'+t+'</div>').join("");
  L.querySelectorAll(".wnode").forEach(el=>el.addEventListener("click",()=>{ wSel=el.dataset.c; sfx.tap(); drawWires(); }));
  R.querySelectorAll(".wnode").forEach(el=>el.addEventListener("click",()=>{
    if(!wSel) { toast("Pick a wire first."); return; }
    Object.keys(wMap).forEach(k=>{ if(wMap[k]===el.dataset.t) delete wMap[k]; });
    wMap[wSel]=el.dataset.t; wSel=null; sfx.tap(); drawWires();
  }));
  // draw connection lines
  const svg=document.getElementById("wireSvg"); if(!svg) return;
  requestAnimationFrame(()=>{
    const box=svg.getBoundingClientRect(); let lines="";
    Object.keys(wMap).forEach(c=>{
      const le=L.querySelector('[data-c="'+c+'"]'), re=R.querySelector('[data-t="'+wMap[c]+'"]');
      if(!le||!re) return;
      const lb=le.getBoundingClientRect(), rb=re.getBoundingClientRect();
      const col=WIRE_COLORS.find(w=>w[0]===c)[1];
      lines+='<path d="M'+(lb.right-box.left)+' '+(lb.top+lb.height/2-box.top)+' C '+(box.width/2)+' '+(lb.top+lb.height/2-box.top)+', '+(box.width/2)+' '+(rb.top+rb.height/2-box.top)+', '+(rb.left-box.left)+' '+(rb.top+rb.height/2-box.top)+'" stroke="'+col+'" stroke-width="3.5" fill="none" stroke-linecap="round"/>';
    });
    svg.innerHTML=lines;
  });
}

const STAR_LAYOUT=[ // [x,y,isTarget(order# or 0)]

const MOON_NAMES=["new","waxing crescent","first quarter","waxing gibbous","full","waning gibbous","last quarter","waning crescent"];
function moonGlyph(i,r){
  // light disc + dark overlay (clipped to the face) per phase
  let s='<clipPath id="mclip"><circle r="'+r+'" /></clipPath>';
  s+='<circle r="'+r+'" fill="#e8eefc" stroke="#33365e" stroke-width="1.5"/>';
  s+='<g clip-path="url(#mclip)">';
  if(i===0) s+='<circle r="'+(r+2)+'" fill="#10122a"/>';
  else if(i===1) s+='<circle cx="'+(-0.5*r)+'" r="'+r+'" fill="#10122a"/>';           // waxing crescent (lit right sliver)
  else if(i===2) s+='<rect x="'+(-r-2)+'" y="'+(-r-2)+'" width="'+(r+2)+'" height="'+(2*r+4)+'" fill="#10122a"/>'; // first quarter
  else if(i===3) s+='<circle cx="'+(-1.45*r)+'" r="'+r+'" fill="#10122a"/>';          // waxing gibbous (dark left sliver)
  else if(i===5) s+='<circle cx="'+(1.45*r)+'" r="'+r+'" fill="#10122a"/>';           // waning gibbous (dark right sliver)
  else if(i===6) s+='<rect x="0" y="'+(-r-2)+'" width="'+(r+2)+'" height="'+(2*r+4)+'" fill="#10122a"/>'; // last quarter
  else if(i===7) s+='<circle cx="'+(0.5*r)+'" r="'+r+'" fill="#10122a"/>';            // waning crescent (lit LEFT sliver)
  s+='</g>';
  return s;
}

function openHints(){
  const rel=HINTS.filter(h=>h.room===S.room&&h.avail());
  let html='<h3>🐾 Ask Smokey</h3>';
  if(!rel.length){ html+='<div class="body">She blinks at you, slow and approving. Nothing in this room still needs her help. (Try another room, or just… look around. She liked watching you figure things out.)</div>'; }
  else {
    html+='<div class="mut">She materializes on the nearest surface, knocks nothing off it (a courtesy), and offers wisdom in three sizes. Reveal only what you need.</div>';
    rel.forEach(h=>{
      html+='<div class="hintTier"><div class="ht">'+h.t+'</div>';
      ["a nudge","a strong hint","just tell me"].forEach((lbl,ti)=>{
        const key=h.k+"_"+ti;
        if(S.hintsRevealed[key]) html+='<div class="body" style="margin-top:4px">• '+h.tiers[ti]+'</div>';
        else html+='<div style="margin-top:4px"><button class="revealBtn" onclick="revealHint(\''+h.k+'\','+ti+')">🐾 '+lbl+'</button></div>';
      });
      html+='</div>';
    });
  }
  const c=document.getElementById("hintCard");
  c.innerHTML='<div class="xbtn" onclick="document.getElementById(\'hintOv\').classList.remove(\'show\')">✕</div>'+html;
  document.getElementById("hintOv").classList.add("show");
}
function revealHint(k,ti){
  S.hintsRevealed[k+"_"+ti]=1; save(); sfx.tap(); openHints();
}

/* ================= [JS-17] JOURNAL / MENU ================= */
function openJournal(){
  const pages=Object.keys(JOURNAL).filter(id=>S.journal[id]);
  let html='<h3>📖 The Journal of Smokey Bones</h3>';
  html+='<div class="mut">Pages you\'ve recovered from around the house. '+(pages.length?'':'None yet — she hid them well, and you helped.')+'</div>';
  const sorted=pages.sort((a,b)=>{
    const ya=JOURNAL[a].t, yb=JOURNAL[b].t;
    const order=["One","Two","Three","Four","Five","Six","Seven","Eight","Ninth"];
    return order.findIndex(o=>ya.includes(o)) - order.findIndex(o=>yb.includes(o));
  });
  sorted.forEach(id=>{ html+='<div class="jpage"><h4>'+JOURNAL[id].t+'</h4><p>'+JOURNAL[id].p+'</p></div>'; });
  html+='<div class="mut" style="margin-top:12px">Flames lit: '+flameCount()+' of 9 — '+FLAMES.filter(f=>S.flames[f.id]).map(f=>f.life).join(" · ")+'</div>';
  const c=document.getElementById("journalCard");
  c.innerHTML='<div class="xbtn" onclick="document.getElementById(\'journalOv\').classList.remove(\'show\')">✕</div>'+html;
  document.getElementById("journalOv").classList.add("show");
}
function openMenu(){
  const c=document.getElementById("menuCard");
  c.innerHTML='<div class="xbtn" onclick="document.getElementById(\'menuOv\').classList.remove(\'show\')">✕</div>'
   +'<h3>Smokey Bones &amp; the House of Nine Lives</h3>'
   +'<div class="body">A pocket escape room about the greatest girl there ever was. Progress saves automatically on this device.</div>'
   +'<div class="mut" style="margin-top:8px">v'+VERSION+' · a Smolder Studios fireside project · sound uses your phone\'s media volume</div>'
   +'<button class="btn wide" onclick="document.getElementById(\'menuOv\').classList.remove(\'show\')">Back to the house</button>'
   +'<button class="btn wide" onclick="if(confirm(\'Erase all progress and start the night over?\'))resetAll()" style="color:var(--bad)">Restart from the beginning</button>';
  document.getElementById("menuOv").classList.add("show");
}

const INTRO=[

function boot(){
  const params=new URLSearchParams(location.search);
  load();
  if(!S.started) S.started=1;
  renderAll();
  if(!S.intro){
    S.intro=true; save();
    showStory(INTRO, ()=>{ save(); });
  }
  if(params.get("dev")==="1") initDev();
}
function initDev(){
  const p=document.getElementById("devPanel");
  p.style.display="flex";

    "ch1 done":()=>{ ["clock","cabinet"].forEach(k=>S.solved[k]=1); Object.assign(S.flags,{clockLooted:1,sideTableOpen:1,fireLit:1,kitchenOpen:1,cush2:1}); ["bell","chartL","hallkey"].forEach(i=>S.items[i]=1); S.used.hallkey=1; S.journal.j_napper=1; S.flames.F1=1; },

    "ch5 done":()=>{ acts["ch4 done"](); S.solved.chimes=1; Object.assign(S.flags,{gnomeRiddle:1,dug:1,charmSet:1,moonIdx:7,yardGateOpen:1,gateOpen:1}); S.journal.j_huntress=1; S.flames.F8=1; },
    "wipe":()=>resetAll(),
  };
  p.innerHTML="<b style='font-size:10px;color:var(--bad)'>DEV</b>";
